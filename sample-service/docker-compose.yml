services:
  postgres:
    image: postgres:16-alpine
    container_name: sample-service-postgres
    environment:
      POSTGRES_DB: sample
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample -d sample"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: sample-service-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sample
      DB_USER: sample
      DB_PASSWORD: sample
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
